<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="MetaJam documentation is coming soon.">
    <meta name="theme-color" content="#f6f8fb">
    <title>Docs coming soon - MetaJam Docs</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      (() => {
        try {
          const savedTheme = localStorage.getItem("metajam-theme");
          const systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.dataset.theme = savedTheme || systemTheme;
        } catch {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
    <link rel="stylesheet" href="/styles.css?v=20260718-citation-nav-docs">
  </head>
  <body class="error-page docs-coming-soon">
    <main class="error-shell docs-shell" aria-labelledby="docs-title">
      <div class="error-content">
        <p class="error-code">Docs</p>
        <h1 id="docs-title">Coming soon</h1>
        <p>The MetaJam documentation area is being prepared.</p>
        <div class="button-row">
          <a class="button primary" href="/">
            <span class="button-icon home-mark" aria-hidden="true"></span>
            <span>Back to home page</span>
          </a>
        </div>
      </div>
      <figure class="error-visual" aria-label="MetaJam logo">
        <a class="error-logo-stage" href="/" aria-label="Return to MetaJam home">
          <img src="/assets/analysis-metajam.svg" alt="" width="296" height="176">
        </a>
      </figure>
    </main>
  </body>
</html>
